<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Influenza</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;}
.header { display:flex; justify-content:space-between; align-items:center; }
.btn {
  background:#22c55e;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
.scroll {
  max-height:300px;
  overflow-y:auto;
}
a { color:#93c5fd; text-decoration:none; }
</style>
</head>

<body>

<div class="header">
  <div>
    <h2>Semana epidemiológica actual</h2>
    <div>
      Autor: Rodrigo Villalobos R. · 
      <a href="mailto:rodrigovillalobos1978@gmail.com">
        rodrigovillalobos1978@gmail.com
      </a>
    </div>
  </div>

  <button class="btn" id="btnExportarExcel">Exportar a Excel</button>
</div>

<div class="card">
  <h3>Grupo principal por año</h3>
  <div class="scroll" id="contenido"></div>
</div>

<script>
let data = [];

fetch("influenza.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    window.data = data;
    render();
  });

function render() {
  const cont = document.getElementById("contenido");
  cont.innerHTML = "";

  const agrupado = {};

  data.forEach(d => {
    if (!agrupado[d.anio]) agrupado[d.anio] = 0;
    agrupado[d.anio]++;
  });

  Object.keys(agrupado).sort().forEach(año => {
    cont.innerHTML += `<div>${año}: ${agrupado[año]} registros</div>`;
  });
}

// Exportar
document.getElementById("btnExportarExcel").addEventListener("click", function () {
  if (!window.data || window.data.length === 0) {
    alert("No hay datos para exportar");
    return;
  }

  const ws = XLSX.utils.json_to_sheet(window.data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Influenza");
  XLSX.writeFile(wb, "influenza.xlsx");
});
</script>

</body>
</html>
